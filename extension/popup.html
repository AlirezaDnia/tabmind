<!DOCTYPE html>
<html>
  <head>
    <title>TabMind</title>

    <style>
      body {
        width: 320px;
        padding: 20px;
        background: #0a0a0a;
        color: white;
        font-family: sans-serif;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border-radius: 12px;
        border: 1px solid #333;
        background: #111;
        color: white;
        box-sizing: border-box;
      }

      button {
        width: 100%;
        margin-top: 12px;
        padding: 12px;
        border: none;
        border-radius: 12px;
        background: white;
        color: black;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <h2>TabMind</h2>

    <p>Paste your extension token.</p>

    <input
      id="token"
      placeholder="tm_..."
    />

    <button id="save">
      Save Token
    </button>

    <script src="popup.js"></script>
  </body>
</html>
